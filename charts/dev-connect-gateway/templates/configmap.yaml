apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dev-connect-gateway.fullname" . }}-haproxy
  labels:
    app.kubernetes.io/name: {{ include "dev-connect-gateway.name" . }}
    app.kubernetes.io/instance: {{ .Values.target.name }}
    app.kubernetes.io/part-of: dev-connect
data:
  haproxy.cfg: |
    global
      log stdout format raw local0

    defaults
      mode tcp
      log global
      timeout connect 10s
      timeout client 12h
      timeout server 12h
      option tcplog

    frontend ssh
      bind :2222
      default_backend target

    backend target
      server {{ .Values.target.name }} {{ .Values.target.host }}:{{ .Values.target.port }} check

