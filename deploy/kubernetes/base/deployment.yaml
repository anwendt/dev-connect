apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-connect-gateway-dev01
  namespace: dev-connect
  labels:
    app.kubernetes.io/name: dev-connect-gateway
    app.kubernetes.io/instance: dev01
    app.kubernetes.io/part-of: dev-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-connect-gateway
      app.kubernetes.io/instance: dev01
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-connect-gateway
        app.kubernetes.io/instance: dev01
        app.kubernetes.io/part-of: dev-connect
    spec:
      serviceAccountName: dev-connect-gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: haproxy
          image: haproxy:3.0-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -f
            - /usr/local/etc/haproxy/haproxy.cfg
          ports:
            - name: ssh-tcp
              containerPort: 2222
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 2222
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 2222
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: haproxy-config
          configMap:
            name: dev-connect-gateway-dev01-haproxy
        - name: tmp
          emptyDir: {}

