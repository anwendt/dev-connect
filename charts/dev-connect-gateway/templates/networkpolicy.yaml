{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dev-connect-gateway.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dev-connect-gateway.name" . }}
      app.kubernetes.io/instance: {{ .Values.target.name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 2222
{{- if and .Values.monitoring.enabled .Values.monitoring.metrics.enabled }}
        - protocol: TCP
          port: {{ .Values.monitoring.metrics.port }}
{{- end }}
  egress:
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.backendCIDR }}
      ports:
        - protocol: TCP
          port: 22
{{- if .Values.networkPolicy.dnsEgress.enabled }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}
