nameOverride: ""
fullnameOverride: ""

target:
  name: dev01
  host: dev01.example.internal
  port: 22

image:
  repository: haproxy
  tag: 3.0-alpine
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 22
  targetPort: 2222
  metricsPort: 8404

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

readinessProbe:
  periodSeconds: 10

livenessProbe:
  periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

rbac:
  create: true
  userGroup: dev-connect-users

networkPolicy:
  enabled: true
  backendCIDR: 10.20.30.42/32
  dnsEgress:
    enabled: true

monitoring:
  enabled: false
  metrics:
    enabled: true
    port: 8404
    path: /metrics
    targetLabel: dev_connect_target
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: rancher-monitoring
  prometheusRule:
    enabled: true
    labels:
      release: rancher-monitoring
    rules:
      backendDown:
        enabled: true
        for: 5m
        severity: warning
      highConnectionErrors:
        enabled: true
        for: 10m
        severity: warning
  grafanaDashboard:
    enabled: true
    namespace: cattle-dashboards
    labels:
      grafana_dashboard: "1"
