apiVersion: v1
kind: ConfigMap
metadata:
  name: dev-connect-gateway-dev01-haproxy
  namespace: dev-connect
  labels:
    app.kubernetes.io/name: dev-connect-gateway
    app.kubernetes.io/instance: dev01
    app.kubernetes.io/part-of: dev-connect
data:
  haproxy.cfg: |
    global
      log stdout format raw local0

    defaults
      mode tcp
      log global
      timeout connect 10s
      timeout client 12h
      timeout server 12h
      option tcplog

    frontend ssh
      bind :2222
      default_backend target

    backend target
      server dev01 dev01.example.internal:22 check

