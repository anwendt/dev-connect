apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-connect-user
  namespace: dev-connect
  labels:
    app.kubernetes.io/name: dev-connect
    app.kubernetes.io/part-of: dev-connect
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - pods
      - endpoints
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/portforward
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-connect-users
  namespace: dev-connect
  labels:
    app.kubernetes.io/name: dev-connect
    app.kubernetes.io/part-of: dev-connect
subjects:
  - kind: Group
    name: dev-connect-users
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: dev-connect-user
  apiGroup: rbac.authorization.k8s.io

