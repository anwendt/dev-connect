apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-connect-gateway.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "dev-connect-gateway.name" . }}
    app.kubernetes.io/instance: {{ .Values.target.name }}
    app.kubernetes.io/part-of: dev-connect
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dev-connect-gateway.name" . }}
      app.kubernetes.io/instance: {{ .Values.target.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "dev-connect-gateway.name" . }}
        app.kubernetes.io/instance: {{ .Values.target.name }}
        app.kubernetes.io/part-of: dev-connect
    spec:
      serviceAccountName: {{ include "dev-connect-gateway.fullname" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: haproxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -f
            - /usr/local/etc/haproxy/haproxy.cfg
          ports:
            - name: ssh-tcp
              containerPort: 2222
              protocol: TCP
{{- if and .Values.monitoring.enabled .Values.monitoring.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.monitoring.metrics.port }}
              protocol: TCP
{{- end }}
          readinessProbe:
            tcpSocket:
              port: 2222
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          livenessProbe:
            tcpSocket:
              port: 2222
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: haproxy-config
          configMap:
            name: {{ include "dev-connect-gateway.fullname" . }}-haproxy
        - name: tmp
          emptyDir: {}
