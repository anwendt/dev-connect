name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE: ghcr.io/anwendt/dev-connect:${{ github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Set up Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          cache: true
          version: v0.72.0

      - name: Set up go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Release readiness
        run: make release-check

      - name: Build release binaries
        run: make build-all VERSION=${{ github.ref_name }}

      - name: Generate SBOM
        run: make sbom

      - name: Build container
        run: make container-build

      - name: Scan container
        run: make container-scan

      - name: Publish container image
        env:
          CONTAINER_REGISTRY_USERNAME: ${{ github.actor }}
          CONTAINER_REGISTRY_PASSWORD: ${{ github.token }}
        run: make container-push

      - name: Package Helm chart
        run: make helm-package

      - name: Publish Helm OCI chart
        env:
          HELM_REGISTRY_USERNAME: ${{ github.actor }}
          HELM_REGISTRY_PASSWORD: ${{ github.token }}
        run: make helm-push

      - name: Generate checksums
        run: make checksums

      - name: Sign artifacts
        run: make sign

      - name: Generate provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*

      - name: Skip provenance for private repository
        if: ${{ github.event.repository.private }}
        run: |
          echo "GitHub artifact attestations are not available for user-owned private repositories; skipping provenance generation."

      - name: Publish GitHub release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
          fi
