name: Performance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Local performance checks
        run: make test-performance-local
