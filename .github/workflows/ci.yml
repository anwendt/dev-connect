name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  client:
    name: Client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Set up golangci-lint
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Formatting
        if: matrix.os == 'ubuntu-latest'
        run: make fmt-check

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: make lint

      - name: Unit tests
        run: make test-unit

      - name: Security tests
        if: matrix.os == 'ubuntu-latest'
        run: make test-security

      - name: End-to-end tests
        run: make test-e2e

      - name: Build
        run: make build

  kubernetes:
    name: Kubernetes package validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Helm lint
        run: make helm-lint

      - name: Helm template
        run: make helm-template

      - name: Kustomize build
        run: make kustomize-build
