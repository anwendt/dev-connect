name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          install-mode: binary
          version: v2.12.2
          args: --version

      - name: Formatting
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit

      - name: Security tests
        run: make test-security

      - name: End-to-end tests
        run: make test-e2e

      - name: Helm lint
        run: make helm-lint

      - name: Helm template
        run: make helm-template

      - name: Kustomize build
        run: make kustomize-build
